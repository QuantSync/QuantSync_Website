<svg width="680" height="460" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg">
<defs>
  <filter id="glowStrong" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="10" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glowSoft" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="4" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <radialGradient id="depthGrad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#000000" stop-opacity="0.55"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="ribbonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#15803D"/>
    <stop offset="50%" stop-color="#22C55E"/>
    <stop offset="100%" stop-color="#4ADE80"/>
  </linearGradient>
</defs>

<style>
@keyframes wobble{
  0%{transform:rotate(-6deg) scale(1,0.97);}
  50%{transform:rotate(6deg) scale(1,1.03);}
  100%{transform:rotate(-6deg) scale(1,0.97);}
}
@keyframes depthPulse{
  0%,100%{opacity:0.2;}
  50%{opacity:0.55;}
}
@keyframes comet1{ from{stroke-dashoffset:0;} to{stroke-dashoffset:-1640;} }
@keyframes comet2{ from{stroke-dashoffset:0;} to{stroke-dashoffset:1600;} }
.wobble{ transform-origin:340px 200px; animation:wobble 6s ease-in-out infinite; }
.depth{ animation:depthPulse 3s ease-in-out infinite; }
.comet1{ stroke-dasharray:46 1600; animation:comet1 3.2s linear infinite; }
.comet2{ stroke-dasharray:22 1618; animation:comet2 4.6s linear infinite; }
</style>

<rect x="0" y="0" width="680" height="460" fill="#050505"/>

<g class="wobble">
  <!-- depth shading at the crossing point, sells an over/under weave -->
  <circle class="depth" cx="340" cy="200" r="34" fill="url(#depthGrad)"/>

  <!-- faint ambient full loop -->
  <path d="M340,200 C270,90 190,90 190,200 C190,310 270,310 340,200 C410,90 490,90 490,200 C490,310 410,310 340,200"
    fill="none" stroke="url(#ribbonGrad)" stroke-width="10" stroke-linecap="round" opacity="0.16" filter="url(#glowSoft)"/>

  <!-- crisp core ribbon -->
  <path d="M340,200 C270,90 190,90 190,200 C190,310 270,310 340,200 C410,90 490,90 490,200 C490,310 410,310 340,200"
    fill="none" stroke="url(#ribbonGrad)" stroke-width="6" stroke-linecap="round" opacity="0.55"/>

  <!-- bright travelling comet, primary direction -->
  <path class="comet1" d="M340,200 C270,90 190,90 190,200 C190,310 270,310 340,200 C410,90 490,90 490,200 C490,310 410,310 340,200"
    fill="none" stroke="#EFFFF4" stroke-width="6" stroke-linecap="round" filter="url(#glowStrong)"/>

  <!-- secondary lighter comet, opposite direction, thinner -->
  <path class="comet2" d="M340,200 C270,90 190,90 190,200 C190,310 270,310 340,200 C410,90 490,90 490,200 C490,310 410,310 340,200"
    fill="none" stroke="#B9FFCF" stroke-width="3" stroke-linecap="round" opacity="0.85" filter="url(#glowSoft)"/>
</g>
</svg>
