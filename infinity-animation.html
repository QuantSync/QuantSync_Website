<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Infinity Animation — 3D style preview</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #050505;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c" width="680" height="460"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const cx = 340, cy = 230;
const A = 220, B = 130;
const color = { h: 142, s: 71, l: 45 }; // #22C55E-ish base hue

function lissajous(t, yShift) {
  return {
    x: cx + A * Math.sin(t),
    y: cy + B * Math.sin(2 * t + yShift),
  };
}

function hsl(h, s, l, a) {
  return `hsla(${h % 360},${s}%,${l}%,${a})`;
}

function drawTrailLayer(phase, baseYShift, opts) {
  const { trailCount, baseOpacity, strokeWidth, blur, hueShift, decay } = opts;
  const resolution = 160;
  for (let i = 0; i < trailCount; i++) {
    const ratio = i / trailCount;
    const yShift = baseYShift + ratio * 0.18 * Math.sin(phase);
    const h = color.h + hueShift * ratio * 60;
    const l = color.l + ratio * 20;
    const op = baseOpacity * Math.pow(decay, i);

    ctx.beginPath();
    for (let j = 0; j <= resolution; j++) {
      const t = (j / resolution) * Math.PI * 2;
      const p = lissajous(t, yShift);
      j === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
    }
    ctx.strokeStyle = hsl(h, color.s, Math.min(l, 90), op);
    ctx.lineWidth = strokeWidth * (1 - ratio * 0.5);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.filter = blur ? `blur(${blur * (1 - ratio * 0.4)}px)` : 'none';
    ctx.stroke();
  }
  ctx.filter = 'none';
}

function drawSpine(baseYShift) {
  const resolution = 200;
  ctx.beginPath();
  for (let j = 0; j <= resolution; j++) {
    const t = (j / resolution) * Math.PI * 2;
    const p = lissajous(t, baseYShift);
    j === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
  }
  ctx.filter = 'blur(8px)';
  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx.lineWidth = 4.5;
  ctx.stroke();
  ctx.filter = 'none';
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 1.4;
  ctx.stroke();
}

function drawDepthRing(phase) {
  const pulse = Math.sin(phase * 2) * 0.5 + 0.5;
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, A * 0.22);
  grad.addColorStop(0, `rgba(0,0,0,${0.45 * pulse})`);
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(cx, cy, A * 0.22, 0, Math.PI * 2);
  ctx.fill();
}

function drawComets(baseYShift, progress, count, speed, colorOverride) {
  for (let p = 0; p < count; p++) {
    const t = ((progress * Math.PI * 4 * speed) - p * 0.18) % (Math.PI * 2);
    const pos = lissajous(t, baseYShift);
    const isHead = p === 0;
    const op = Math.max(0, 1 - p / count);
    const col = colorOverride || 'rgba(255,255,255,';

    ctx.beginPath();
    ctx.filter = `blur(${isHead ? 9 : 5}px)`;
    ctx.fillStyle = col + (op * 0.35) + ')';
    ctx.arc(pos.x, pos.y, isHead ? 7 : 3.5 - p * 0.5, 0, Math.PI * 2);
    ctx.fill();

    ctx.filter = 'none';
    ctx.beginPath();
    ctx.fillStyle = col + (op * 0.9) + ')';
    ctx.arc(pos.x, pos.y, isHead ? 3 : 1.8 - p * 0.3, 0, Math.PI * 2);
    ctx.fill();

    if (isHead) {
      ctx.beginPath();
      ctx.fillStyle = '#fff';
      ctx.arc(pos.x - 1.2, pos.y - 1.2, 0.9, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

let start = null;
const durationMs = 6000;

function frame(ts) {
  if (!start) start = ts;
  const progress = ((ts - start) % durationMs) / durationMs;
  const phase = progress * Math.PI * 2;
  const baseYShift = Math.sin(phase) * Math.PI / 1.5;

  ctx.clearRect(0, 0, 680, 460);
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(Math.sin(phase) * 0.12);
  ctx.translate(-cx, -cy);

  drawTrailLayer(phase, baseYShift, { trailCount: 6, baseOpacity: 0.08, strokeWidth: 14, blur: 22, hueShift: 0, decay: 0.6 });
  drawTrailLayer(phase, baseYShift, { trailCount: 10, baseOpacity: 0.18, strokeWidth: 7, blur: 10, hueShift: 0.3, decay: 0.75 });
  drawTrailLayer(phase, baseYShift, { trailCount: 12, baseOpacity: 0.72, strokeWidth: 3.2, blur: 2.5, hueShift: 0.7, decay: 0.82 });
  drawSpine(baseYShift);
  drawDepthRing(phase);
  drawComets(baseYShift, progress, 5, 1.0);
  drawComets(baseYShift + Math.PI, progress, 3, 1.35, 'rgba(150,255,150,');

  ctx.restore();
  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
</script>
</body>
</html>
