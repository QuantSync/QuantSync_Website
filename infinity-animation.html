<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Infinity Animation — 3D style preview</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #050505;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  canvas { display: block; }
  #fallback {
    color: #ff6b6b;
    font-family: monospace;
    font-size: 14px;
    display: none;
    text-align: center;
  }
</style>
</head>
<body>
<canvas id="c" width="680" height="460"></canvas>
<div id="fallback">Canvas 2D is not available in this browser/viewer.<br/>Open this file directly in Chrome, Firefox, or Edge.</div>

<script>
(function () {
  var canvas = document.getElementById('c');
  var ctx = null;
  try {
    ctx = canvas.getContext('2d');
  } catch (e) {
    ctx = null;
  }
  if (!ctx) {
    canvas.style.display = 'none';
    document.getElementById('fallback').style.display = 'block';
    return;
  }

  var cx = 340, cy = 230;
  var A = 220, B = 130;
  var color = { h: 142, s: 71, l: 45 };

  function lissajous(t, yShift) {
    return {
      x: cx + A * Math.sin(t),
      y: cy + B * Math.sin(2 * t + yShift)
    };
  }

  function hsl(h, s, l, a) {
    return 'hsla(' + (h % 360) + ',' + s + '%,' + l + '%,' + a + ')';
  }

  // Cheaper glow: shadowBlur/shadowColor instead of per-shape ctx.filter blur.
  // Far less CPU cost per frame, and supported in effectively every canvas
  // implementation (ctx.filter is a newer API some embedded webviews skip).
  function drawTrailLayer(baseYShift, opts) {
    var trailCount = opts.trailCount, baseOpacity = opts.baseOpacity,
        strokeWidth = opts.strokeWidth, glow = opts.glow,
        hueShift = opts.hueShift, decay = opts.decay;
    var resolution = 90;

    for (var i = 0; i < trailCount; i++) {
      var ratio = i / trailCount;
      var yShift = baseYShift + ratio * 0.15;
      var h = color.h + hueShift * ratio * 60;
      var l = Math.min(color.l + ratio * 20, 88);
      var op = baseOpacity * Math.pow(decay, i);

      ctx.beginPath();
      for (var j = 0; j <= resolution; j++) {
        var t = (j / resolution) * Math.PI * 2;
        var p = lissajous(t, yShift);
        if (j === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
      }
      ctx.strokeStyle = hsl(h, color.s, l, op);
      ctx.lineWidth = strokeWidth * (1 - ratio * 0.5);
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.shadowBlur = glow;
      ctx.shadowColor = hsl(h, color.s, l, op);
      ctx.stroke();
    }
    ctx.shadowBlur = 0;
  }

  function drawSpine(baseYShift) {
    var resolution = 120;
    ctx.beginPath();
    for (var j = 0; j <= resolution; j++) {
      var t = (j / resolution) * Math.PI * 2;
      var p = lissajous(t, baseYShift);
      if (j === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
    }
    ctx.shadowBlur = 12;
    ctx.shadowColor = 'rgba(255,255,255,0.5)';
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 1.6;
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  function drawDepthRing(phase) {
    var pulse = Math.sin(phase * 2) * 0.5 + 0.5;
    var grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, A * 0.22);
    grad.addColorStop(0, 'rgba(0,0,0,' + (0.45 * pulse) + ')');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, cy, A * 0.22, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawComets(baseYShift, progress, count, speed, colorOverride) {
    for (var p = 0; p < count; p++) {
      var t = ((progress * Math.PI * 4 * speed) - p * 0.18) % (Math.PI * 2);
      var pos = lissajous(t, baseYShift);
      var isHead = p === 0;
      var op = Math.max(0, 1 - p / count);
      var col = colorOverride || 'rgba(255,255,255,';

      ctx.shadowBlur = isHead ? 14 : 8;
      ctx.shadowColor = col + (op * 0.6) + ')';
      ctx.beginPath();
      ctx.fillStyle = col + (op * 0.85) + ')';
      ctx.arc(pos.x, pos.y, isHead ? 3.2 : 1.9 - p * 0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      if (isHead) {
        ctx.beginPath();
        ctx.fillStyle = '#fff';
        ctx.arc(pos.x - 1.2, pos.y - 1.2, 0.9, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  var start = null;
  var durationMs = 6000;

  function frame(ts) {
    if (!start) start = ts;
    var progress = ((ts - start) % durationMs) / durationMs;
    var phase = progress * Math.PI * 2;
    var baseYShift = Math.sin(phase) * (Math.PI / 1.5);

    ctx.clearRect(0, 0, 680, 460);
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(Math.sin(phase) * 0.12);
    ctx.translate(-cx, -cy);

    drawTrailLayer(baseYShift, { trailCount: 5, baseOpacity: 0.10, strokeWidth: 12, glow: 18, hueShift: 0, decay: 0.6 });
    drawTrailLayer(baseYShift, { trailCount: 7, baseOpacity: 0.22, strokeWidth: 6, glow: 8, hueShift: 0.3, decay: 0.75 });
    drawTrailLayer(baseYShift, { trailCount: 8, baseOpacity: 0.75, strokeWidth: 3, glow: 2, hueShift: 0.7, decay: 0.82 });
    drawSpine(baseYShift);
    drawDepthRing(phase);
    drawComets(baseYShift, progress, 5, 1.0);
    drawComets(baseYShift + Math.PI, progress, 3, 1.35, 'rgba(150,255,150,');

    ctx.restore();
    window.requestAnimationFrame(frame);
  }

  window.requestAnimationFrame(frame);
})();
</script>
</body>
</html>
